\subsubsection{Microcontroller: ESP32 DevKit (WROOM-32)}

Each sensor node is built around an ESP32 DevKit development board (featuring the ESP32-WROOM-32 module)~\cite{espressif_esp32}, powered by a dual-core Xtensa LX6 microcontroller clocked at 240\,MHz with an on-chip 12-bit successive-approximation register (SAR) ADC. The MyoWare RAW output is sampled on ADC1\_CH6 (GPIO34) using \texttt{analogReadMilliVolts()}, which applies the ESP32 factory calibration to return a millivolt value directly.

The sampling rate of 1\,kSa/s is selected in accordance with the Nyquist--Shannon sampling theorem~\cite{shannon1949communication}, which requires the sampling frequency $f_s$ to satisfy
\begin{equation}
  f_s \geq 2 \cdot f_{\max},
\end{equation}
where $f_{\max}$ is the highest frequency of interest in the signal. The MyoWare~2.0 hardware band-pass filter passes nominally 20--500\,Hz; therefore the minimum permissible sampling rate is $2 \times 500 = 1000\,\text{Sa/s}$. Choosing $f_s = 1\,\text{kSa/s}$ exactly meets this Nyquist limit, and the 450\,Hz software low-pass filter applied downstream provides a 50\,Hz guard band (one decade of roll-off headroom) that prevents any spectral leakage from the 450--500\,Hz transition region from corrupting the signal band of interest. The effective number of bits (ENOB) at this operating point is approximately 11, consistent with published characterisation of the ESP32 ADC1 under similar supply and input conditions~\cite{gomez2022wearable}.

Samples are accumulated into fixed-length 50-point windows (50\,ms). Each batch packet is structured as follows: a 1-byte type identifier, a 1-byte node ID, a 4-byte frame counter (\texttt{frame\_id\_start}), a 4-byte frame-based millisecond timestamp (\texttt{t0\_ms}), a 4-byte inter-sample interval (\texttt{dt\_us}\,=\,1000\,$\mu$s), a 2-byte sample count, and 100\,bytes of unsigned 16-bit ADC millivolt values---approximately 116\,bytes in total, well within the 250-byte ESP-NOW payload ceiling. Each node transmits twenty batch packets per second ($1000\,\text{Sa/s} \div 50 = 20\,\text{batches/s}$), yielding a per-channel data throughput of $20 \times 116 \approx 2.3\,\text{kB/s}$.

A 3\,mm green LED, connected directly to the 3.3\,V rail through a 470\,$\Omega$ current-limiting resistor (R1), serves as a simple power-on indicator. It illuminates whenever the regulated supply is active, allowing the operator to confirm that the node is powered without requiring any software interaction.

\subsubsection{Power Conditioning: 3.3\,V Regulator and Decoupling}

The Li-Po cell output (nominally 3.7\,V, ranging from 3.0\,V to 4.2\,V over the discharge cycle) is regulated to a stable 3.3\,V by a low-dropout linear regulator before reaching the ESP32 and the MyoWare front-end. This ensures that ADC reference voltage variation does not introduce a supply-dependent offset into the sEMG readings. Two decoupling capacitors are placed at the regulator output: a 10\,$\mu$F bulk capacitor (C1) that suppresses low-frequency load transients caused by the ESP32 radio bursts, and a 100\,nF ceramic capacitor (C2) that attenuates high-frequency switching noise and provides local charge storage for the ADC sample-and-hold circuit. Together, C1 and C2 maintain a clean, stable supply to both the analogue front-end and the digital core throughout the wireless transmission cycle.

\subsubsection{Charging and Power Path}

The Li-Po cell is charged via a TP4056-based module (U1) with an on-board 4.2\,k$\Omega$ programming resistor (R2) that sets the constant-current charge rate to approximately 250\,mA. A USB-C receptacle on the module provides the charge input, allowing standard USB power banks or wall adapters to be used in the field. An SPST switch (S1) is positioned on the regulated 3.3\,V rail between the output of the LDO regulator and the 3.3\,V power input of the ESP32 DevKit and MyoWare front-end. This configuration allows the active components to be powered off while keeping the battery connected to the TP4056 charger module. The complete circuit schematic for one sensor node is shown in Fig.~\ref{fig:schematic}.

