\subsection{Wireless Communication and Node Synchronisation}

ESP-NOW is a proprietary Espressif protocol that encapsulates short data payloads in IEEE\,802.11 vendor-specific action frames and delivers them peer-to-peer---typically at 1\,Mbps in 802.11b compatibility mode---without a TCP/IP stack, association handshake, or routing layer~\cite{espressif_espnow, amponis2022espnow}. The resulting end-to-end latency of 1--10\,ms is roughly two orders of magnitude lower than a Wi-Fi/MQTT path (50--500\,ms)~\cite{eridani2021espnow}. While this latency advantage is less critical for the offline classification pipeline presented in the following section, it would become significant if the system were later adapted for closed-loop real-time biofeedback.

Each slave node is pre-registered to the master's MAC address at firmware initialisation, implementing a one-to-many star configuration consistent with the approach described by Labib~\textit{et~al.}~\cite{labib2021espnow}. Based on published characterisation of comparable ESP-NOW deployments in similar indoor environments, packet loss is expected to remain below 1\% over the operating ranges encountered in a gym setting~\cite{george2023indoor}.

% [AUTHOR NOTE: Consider reporting a measured packet-loss figure from a
% bench test at the actual operating range (e.g., a simple frame counter
% comparison over N sessions). Even a short 5-minute benchtop measurement
// would replace the estimated figure above with a verifiable result.]

\textit{Synchronisation.} Hardware-level inter-node synchronisation is achieved through a master-broadcast beacon mechanism. The master ESP32 emits a 13-byte sync beacon every 1\,ms over the ESP-NOW broadcast address (\texttt{FF:FF:FF:FF:FF:FF}), yielding a system sample rate of 1\,kSa/s per channel. Each beacon contains a monotonically increasing frame counter (\texttt{frame\_id}) and a microsecond-resolution hardware timestamp (\texttt{master\_us}) generated by \texttt{esp\_timer\_get\_time()}. On receipt, each slave node immediately latches its ADC---ensuring that all four channels sample at the same instant, rather than relying on software loop timing. Because the single-sample unicast per beacon was eliminated from the slave firmware (the master forwards batch packets only), no TDMA slot delay is required; batch packets are assembled in a double-buffered ring and dispatched from the Arduino \texttt{loop()} task, fully outside the receive callback. This beacon-driven approach eliminates the inter-channel skew associated with unsynchronised free-running clocks, and the \texttt{frame\_id} field provides the host with an unambiguous sample alignment index without any post-hoc correction. Specifically, the timestamp assigned to each recorded sample is $\texttt{ts}_{i} = (\texttt{frame\_id\_start} + i) \times 1\,\text{ms}$, placing every channel in the same temporal coordinate system and enabling exact row-wise alignment in the exported CSV.

