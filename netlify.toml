\subsection{Design Trade-offs and Limitations}

Distributing acquisition across four independent wireless nodes resolves the cable and motion-artefact problems of centralised architectures, but introduces trade-offs that are worth stating explicitly.

\begin{itemize}

  \item \textit{Sampling rate.} The beacon fires every 1\,ms, yielding a system sample rate of 1\,kSa/s per channel. The MyoWare~2.0 hardware band-pass passes 20--500\,Hz; at $f_s = 1\,\text{kSa/s}$ the Nyquist frequency is exactly 500\,Hz, satisfying the sampling theorem with no margin to spare. A 450\,Hz software low-pass filter applied in the browser provides a 50\,Hz guard band that prevents any spectral leakage from the 450--500\,Hz roll-off region from contaminating the recorded signal. Should a different temporal resolution be required, only \texttt{BEACON\_INTERVAL\_US} in \texttt{ESP\_master.ino} and \texttt{DT\_US} in \texttt{ESP\_slave.ino} need to be adjusted---both the firmware timestamp logic and the browser filter bank adapt automatically via the \texttt{dt\_us} field in each JSON frame.

  \item \textit{Collision avoidance for batch transmissions.} Because single-sample unicast packets per beacon were eliminated in the final firmware architecture, no TDMA slot delay is required. Batch packets (one per 50-sample window) are dispatched from the slave \texttt{loop()} task, which fires every 50\,ms per channel. The ESP-NOW physical layer uses IEEE\,802.11 CSMA-CA for medium access, which handles the low-rate simultaneous transmissions from four nodes with negligible packet loss in a controlled indoor environment~\cite{george2023indoor}. Expanding to a fifth channel would not require any timing changes.

  \item \textit{Battery endurance.} The estimated 4.7-hour runtime covers typical gym sessions but falls short of full-day ambulatory monitoring. Extended deployment would require a higher-capacity cell or a duty-cycling strategy that suspends the radio between transmission windows.

  \item \textit{Software-defined signal conditioning.} Routing the pre-rectification RAW signal to the ADC shifts band-pass filtering, artefact rejection, and feature extraction to software on the host. This preserves spectral information that hardware envelope detection would discard~\cite{phinyomark2018feature}, but increases the processing load on the offline pipeline and requires careful filter design to avoid group-delay artefacts in non-stationary recording conditions~\cite{emg_classification2026}.

  \item \textit{ADC non-linearity.} The ESP32 ADC1 exhibits moderate integral non-linearity, particularly near the supply rails. The 3.3\,V LDO and the 100\,nF bypass capacitor (C2) reduce supply noise, but applications requiring high absolute amplitude accuracy may benefit from an external ADC with better linearity specifications.

\end{itemize}


