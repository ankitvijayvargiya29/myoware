\section{Hardware Design}

\subsection{System Architecture}

Centralised, wired sEMG acquisition introduces a set of problems that become increasingly difficult to manage in dynamic exercise environments: electrode lead wires pick up motion artefact proportional to cable length, restrict the subject's range of motion, and impose a physical tether that is impractical outside a laboratory. To avoid these trade-offs, the acquisition electronics in GymEMG-Net are distributed directly to the muscles.

The system comprises four identical battery-powered sensor nodes and one master gateway arranged in a star topology, as shown in Fig.~\ref{fig:arch}. Each node is positioned over a target muscle group and is entirely self-contained---it handles local amplification, digitisation, and wireless transmission without any wired connection to the host. The four slave nodes communicate with the master ESP32 over ESP-NOW~\cite{espressif_espnow}; the master aggregates all four channels and relays the merged stream to a host PC via USB-UART, where a monitoring GUI renders the live signals in real time and logs them to disk for offline analysis. No access point, router, or Bluetooth pairing is involved at any stage of the link.

\begin{figure}[!t]
\centering
\includegraphics[width=\columnwidth]{figures/system_architecture.png}
\caption{Overall system architecture. Four wireless sensor nodes (each comprising a MyoWare~2.0 and an ESP32-WROOM-32) transmit raw sEMG frames to a master ESP32 over ESP-NOW. The master aggregates all four channels and forwards the merged stream to a host PC via USB serial, where a monitoring GUI renders the live signals and exports session data.}
\label{fig:arch}
\end{figure}


\subsection{Sensor Node Design}

\subsubsection{sEMG Front-End: MyoWare 2.0}

The MyoWare 2.0 (Advancer Technologies) integrates a differential instrumentation amplifier, a band-pass filter stage, and a full-wave rectifier onto a compact 44.7\,mm\,$\times$\,20.3\,mm board~\cite{advancer_myoware2}. The key design advantage for a body-worn application is its snap-electrode interface: three integrated connectors accept standard Ag/AgCl disposable pads directly on the board, eliminating the intermediate lead wires that are a primary source of motion-artefact contamination in ambulatory recordings. The two in-line snaps form the differential recording pair, positioned approximately 20\,mm apart along the muscle belly in accordance with SENIAM guidelines~\cite{Hermens2000SENIAM}. The third connector (REF) accepts a passive reference electrode placed over a bony landmark and is connected to the board's analogue ground, providing common-mode rejection without requiring a driven-right-leg circuit.

The RAW output pin, which carries the amplified, band-pass-filtered bipolar sEMG signal prior to rectification, is routed directly to GPIO34 (ADC1\_CH6) of the ESP32. Using the pre-rectification output preserves the full spectral content of the signal---nominally 20--500\,Hz, as defined by the MyoWare~2.0 hardware band-pass filter---and gives the downstream classifier access to both amplitude and frequency features, rather than constraining it to the hardware-defined envelope time constant~\cite{phinyomark2018feature}. This approach is consistent with comparable low-cost wearable sEMG implementations~\cite{gomez2022wearable}. Recent work confirms that 1D-CNN classifiers operating on raw lower-limb sEMG achieve $97.0 \pm 0.8$\% accuracy across seven motion classes~\cite{mot_semg2025}, validating the spectral richness of the pre-rectification signal for gym exercise recognition.

