\subsection{Mechanical Enclosure}

Each assembled sensor node is housed in a custom enclosure fabricated using fused deposition modelling (FDM) with polylactic acid (PLA) filament at a layer resolution of 0.2\,mm, providing an acceptable balance between surface finish quality and print time. The enclosure measures 55\,mm\,$\times$\,39\,mm\,$\times$\,22\,mm (length\,$\times$\,width\,$\times$\,height) and consists of two interlocking halves secured by four M2 machine screws, allowing non-destructive access to the internal electronics for firmware updates, battery replacement, or sensor servicing. Cable entry ports with smooth radiused edges protect the sensor cables from chafing and abrasion during wearable use. The enclosure is fitted with an elastic strap that wraps around the limb segment, holding the node firmly in place without restricting joint movement. The assembled enclosure is shown in Fig.~\ref{fig:enclosure}.

