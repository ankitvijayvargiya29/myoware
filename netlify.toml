\subsection{Browser-Based Monitoring GUI}

The host interface is implemented as a single-page web application served from a static hosting platform (Vercel) and accessed in any Chromium-based browser (Google Chrome, Microsoft Edge) that supports the Web Serial API. No native application, driver installation, or Python environment is required on the host machine.

Upon clicking \emph{Connect}, the browser presents the OS-level USB device picker; once the user selects the master ESP32, the dashboard opens a serial port at 921600\,baud and begins parsing the incoming JSON stream entirely in JavaScript. The GUI provides the following functions:

\begin{itemize}
  \item \textit{Real-time waveform display.} Four independent strip charts (one per channel) update at $\sim$30\,frames per second using Chart.js. Each chart displays the most recent 500 samples ($\approx$1\,s of data) with per-channel RMS, peak, peak-to-peak, and mean amplitude readouts updated continuously. An auto-scale toggle fits the Y-axis to the current signal range.

  \item \textit{Software signal conditioning.} A causal biquad IIR filter bank (implemented in the \texttt{emg-engine.js} module) applies a 20\,Hz high-pass, a 450\,Hz low-pass, and a 50\,Hz notch filter to each channel in real time at the correct Nyquist frequency of 1\,kHz~\cite{robertson2004research}. The filter can be toggled on or off at any point; toggling on resets all filter state to prevent transient artefacts.

  \item \textit{Session recording and export.} Participant metadata (ID, sex, age, mass, height) and exercise parameters (type, trial number) are entered via the control panel before each trial. Clicking \emph{Record} captures raw ADC millivolt values together with hardware-derived timestamps for all active channels. On stopping, three CSV formats are available for download: (i)~\emph{Aligned (Filtered)}---a four-column wide-format table in which each row corresponds to a single beacon frame, channels are time-aligned by \texttt{frame\_id}, and all values have been passed through the offline zero-phase filter; (ii)~\emph{Aligned (Raw)}---identical layout without filtering; and (iii)~\emph{Long CSV}---one row per sample across all channels, preserving individual hardware timestamps and sync keys for IEEE-style signal-processing analysis.

  \item \textit{System diagnostics.} A statistics bar displays the cumulative packet count, parse error count, data volume, and effective sample rate (derived from the \texttt{dt\_us} field in each JSON frame rather than browser timing, so all four channels report identically 1\,kHz).

  \item \textit{EMG Biofeedback Game.} A companion page (\emph{Muscle Rush}) uses the same \texttt{emg-engine.js} pipeline to drive a browser-based game: the player controls an in-game character by contracting specific muscles, with difficulty scaling proportional to the channel RMS amplitude. This mode can serve as a motivational tool during data collection sessions or as a standalone biofeedback interface.
\end{itemize}

