\subsection{Signal Acquisition, Transmission, and Host Interface}

Once a 50-sample window is accumulated, the slave firmware packs it into a batch packet and dispatches it to the master's registered MAC address over ESP-NOW. A critical implementation detail concerns the \texttt{t0\_ms} field: rather than deriving this value from each slave's independent \texttt{millis()} counter---which begins at zero at each node's own power-on instant and therefore diverges across devices---the firmware computes
\begin{equation}
  \texttt{t0\_ms} = \texttt{frame\_id\_start} \times 1\,\text{ms},
\end{equation}
where \texttt{frame\_id\_start} is the master's global beacon counter at the first sample of the batch. Because every slave uses the same beacon counter as its time reference, all four channels share a common epoch, making row-wise alignment in the recorded CSV exact without any post-hoc correction.

The master ESP32 receives the batch packets over ESP-NOW and serialises each into a single JSON line forwarded over USB-UART at 921600\,baud:
\begin{verbatim}
{"slave":0,"frame_id_start":1200,
 "t0":1200,"dt_us":1000,"mv":[...50 values...]}
\end{verbatim}
The master requires no WiFi router connection; it runs WiFi in station mode solely to satisfy the ESP-NOW radio driver, and the channel is hard-coded to channel~6 to match all slave nodes. No TCP/IP stack, WebSocket server, or network infrastructure is involved at the host interface.

The host PC reads the serial stream directly through the\,Web\,Serial\,API~\cite{webserial_spec} in the monitoring GUI (described below), which parses the JSON frames in the browser, renders live channel traces, and exports session data to disk in CSV format.

