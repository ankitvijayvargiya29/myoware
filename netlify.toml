\subsection{Electrode Configuration and Placement}

Electrodes are mounted on the MyoWare 2.0 snap connectors and positioned according to SENIAM guidelines~\cite{Hermens2000SENIAM}. For the four-channel configuration used here, the target muscles are the rectus femoris, biceps femoris, gastrocnemius medialis, and tibialis anterior---a combination that captures the primary flexor--extensor dynamics of the lower limb during gym-based exercise (squats, lunges, leg press). This muscle selection is consistent with recent eight-channel lower-limb sEMG benchmarks for motion recognition~\cite{mot_semg2025, vijayvargiya2022semg}. The reference electrode for each node is placed over the nearest palpable bony landmark: the lateral femoral condyle for the thigh nodes and the lateral malleolus for the shank nodes. All electrodes are single-use Ag/AgCl disposable pads and are replaced between subjects to prevent cross-contamination. Fig.~\ref{fig:placement} shows the four sensor placement sites on the lower limb, with a close-up of one mounted node in Fig.~\ref{fig:placement_zoom}.

