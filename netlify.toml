\subsection{Power Supply and Safety}

Every sensor node is powered exclusively from its own 3.7\,V / 500\,mAh Li-Po cell, maintaining full galvanic isolation between the subject and any mains-referenced equipment---a fundamental safety requirement for wearable biopotential acquisition systems~\cite{vijayvargiya2022hardware}. The master node communicates with the host PC over USB-UART, but carries no electrode connection to the body, so the four sensor nodes remain electrically isolated from the mains path throughout operation. Ag/AgCl electrodes are used as single-use, disposable components and are replaced between participants.

Based on the quiescent current specifications of the ESP32-WROOM-32 in active transmit mode and the MyoWare 2.0 front-end supply current, the average node current draw is estimated at approximately 85\,mA. Applying a standard 80\% derating factor for Li-Po discharge efficiency, the 500\,mAh cell is expected to provide approximately 4.7\,hours of continuous operation---sufficient for a full training session. Battery voltage is sampled on ADC1\_CH7 once per second and encoded in the status byte appended to every transmitted frame, enabling post-hoc detection of any supply-induced baseline drift.

